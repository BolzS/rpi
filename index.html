<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stumm starten und nach Klick Ton aktivieren</title>
</head>
<body>
    <audio id="audio" controls>
        <source src="/assets/Lügenlord.mp3" type="audio/mp3">
    </audio>

    <button id="playButton">Klick hier, um das Audio zu hören!</button>

    <script>
        var audioElement = document.getElementById("audio");
        audioElement.muted = true; // Zuerst das Audio stumm abspielen
        audioElement.play(); // Audio abspielen, aber ohne Ton

        document.getElementById("playButton").addEventListener("click", function() {
            audioElement.muted = false;  // Ton aktivieren
            audioElement.play();  // Audio weiterspielen
            this.style.display = "none";  // Button ausblenden
        });
    </script>
</body>
</html>
